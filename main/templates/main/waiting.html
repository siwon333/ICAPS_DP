{% extends 'main/base.html' %}

{% block title %}대기 화면{% endblock %}

{% block content %}
<h1>대기 화면입니다</h1>
<p>잠시만 기다려주세요...</p>
<div style="margin: 20px 0;">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 0 auto;"></div>
</div>
<a href="{% url 'main:info' %}" class="btn btn-secondary">자무 설명으로</a>
<a href="{% url 'main:complete' %}" class="btn">완성으로</a>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
{% endblock %}
